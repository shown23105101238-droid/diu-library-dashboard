<div class="hero">
  <h2>Welcome to DIU Digital Library</h2>

</div>

<div class="modal-overlay" id="feedbackModal">
  <div class="modal-box">
    <a href="#" class="close-btn">&times;</a>
    <h3>Share Your Feedback</h3>
    
    <form id="userFeedbackForm">
      <div class="input-group">
        <label for="fbName">Full Name</label>
        <input type="text" id="fbName" placeholder="Enter your full name" required>
      </div>
      
      <div class="input-group">
        <label for="fbEmail">DIU Email Address</label>
        <input type="email" id="fbEmail" placeholder="example@diu.edu.bd" required>
      </div>
      
      <div class="input-group">
        <label for="fbMessage">Your Message / Suggestion</label>
        <textarea id="fbMessage" rows="4" placeholder="How can we improve our library system?" required></textarea>
      </div>
      
      <button type="submit" class="submit-btn feedback-submit">Submit Feedback</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <a href="#" class="close-btn">&times;</a>
    <h3>Admin Security Login</h3>
    
    <form id="adminLoginForm">
      <div class="input-group">
        <label for="uName">Username</label>
        <input type="text" id="uName" placeholder="Enter admin username" required>
      </div>
      <div class="input-group">
        <label for="uPass">Password</label>
        <input type="password" id="uPass" placeholder="Enter account password" required>
      </div>
      <button type="submit" class="submit-btn admin-submit">Access Panel</button>
    </form>
  </div>
</div>
